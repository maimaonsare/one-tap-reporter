<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scene1Render</title>
<style>
  :root { --green:#3DBE29; --greenB:#5cff3d; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; overflow:hidden; background:#000; }
  body { font-family:"Segoe UI", Arial, sans-serif; color:#fff; position:relative; }
  #stage { position:absolute; inset:0; transform-origin:center; }
  .shot { position:absolute; inset:0; opacity:0; }

  /* ---------- SHOT 1 ---------- */
  #s1 .half { position:absolute; top:0; bottom:0; overflow:hidden; }
  #s1 .left { left:0; width:52%; background:#0a0d0a; }
  #s1 .right { right:0; width:52%; background:#020402;
    clip-path: polygon(100% 0, 100% 100%, 0 100%, 18% 0); }
  #s1 img { position:absolute; width:110%; left:-5%; top:-5%; height:110%; object-fit:cover;
    filter: contrast(1.08) saturate(1.05) brightness(.96); }
  #s1 .grade { position:absolute; inset:0;
    background: radial-gradient(ellipse at 40% 35%, transparent 30%, rgba(0,0,0,.72) 100%); }
  #s1 .rain { position:absolute; inset:0; opacity:.14; pointer-events:none;
    background: repeating-linear-gradient(78deg, transparent 0 22px, rgba(200,255,220,.5) 22px 23px, transparent 23px 48px); }
  #onhold {
    position:absolute; left:8%; bottom:30%; font-size:52px; font-weight:700;
    letter-spacing:3px; text-shadow:0 0 24px rgba(255,255,255,.55);
  }
  #spinner {
    position:absolute; left:8%; bottom:20.5%; width:64px; height:64px; border-radius:50%;
    border:6px solid rgba(255,255,255,.18); border-top-color:#fff;
    box-shadow:0 0 26px rgba(255,255,255,.35);
  }
  #waitwrap { position:absolute; left:8%; bottom:7%; }
  #waittime { font-size:84px; font-weight:800; color:#ff3b2f;
    text-shadow:0 0 34px rgba(255,60,40,.8); font-variant-numeric:tabular-nums; }
  #waitlbl { font-size:30px; font-weight:700; color:#ff6b5f; letter-spacing:5px; }
  #beam { position:absolute; top:-20%; bottom:-20%; width:130px;
    background:linear-gradient(90deg, transparent, rgba(180,255,160,.95), transparent);
    transform:rotate(9deg); filter:blur(6px); }
  .ripple { position:absolute; border-radius:50%; border:14px solid var(--greenB);
    box-shadow:0 0 60px var(--green), inset 0 0 60px var(--green); }
  #flash { position:absolute; inset:0; background:radial-gradient(circle, #eaffe4 0%, #52e03a 45%, #0c2408 100%); }

  /* ---------- SHOT 2 ---------- */
  #s2 { background:
    radial-gradient(ellipse at 50% 42%, rgba(61,190,41,.10), transparent 55%),
    #010401; }
  #floor { position:absolute; left:-30%; right:-30%; bottom:-6%; height:52%;
    background:
      repeating-linear-gradient(rgba(61,190,41,.28) 0 2px, transparent 2px 70px),
      repeating-linear-gradient(90deg, rgba(61,190,41,.28) 0 2px, transparent 2px 90px);
    transform: perspective(700px) rotateX(63deg); transform-origin:top;
    mask-image: linear-gradient(black 0%, transparent 90%);
    -webkit-mask-image: linear-gradient(black 0%, transparent 90%);
  }
  #fog { position:absolute; inset:0; background:
    radial-gradient(ellipse at 50% 78%, rgba(61,190,41,.14), transparent 55%); }
  #scantitle { position:absolute; top:7%; width:100%; text-align:center;
    font-size:58px; font-weight:800; letter-spacing:10px; color:var(--greenB);
    text-shadow:0 0 30px var(--green); }
  #phone { position:absolute; left:50%; top:47%; width:230px; height:470px;
    margin:-235px 0 0 -115px; border-radius:38px;
    background:linear-gradient(160deg, #0b1a0c, #041004);
    border:4px solid var(--green); }
  #phone .notch { position:absolute; top:14px; left:50%; transform:translateX(-50%);
    width:80px; height:16px; border-radius:9px; background:#000; border:2px solid #123c0d; }
  #phone .chk { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:150px; color:var(--greenB); text-shadow:0 0 50px var(--green); font-weight:900; }
  #beams { position:absolute; inset:0; }
  .icon { position:absolute; width:150px; height:150px; margin:-75px 0 0 -75px; border-radius:50%;
    background:rgba(8,26,7,.9); border:4px solid var(--green);
    box-shadow:0 0 34px rgba(61,190,41,.55), inset 0 0 26px rgba(61,190,41,.28);
    display:flex; align-items:center; justify-content:center; font-size:62px; }
  .ilabel { position:absolute; white-space:nowrap; font-size:30px; font-weight:800;
    letter-spacing:3px; color:#d8ffd0; text-shadow:0 0 14px rgba(61,190,41,.8); top:158px; width:100%; text-align:center; }
  #ticket { position:absolute; left:50%; top:78%; width:340px; height:120px; margin-left:-170px;
    border-radius:22px; border:5px solid #29e8c8;
    background:linear-gradient(160deg, rgba(8,40,34,.95), rgba(2,16,13,.95));
    box-shadow:0 0 60px rgba(41,232,200,.6);
    display:flex; align-items:center; justify-content:center;
    font-size:52px; font-weight:900; letter-spacing:8px; color:#8ffce9;
    text-shadow:0 0 22px rgba(41,232,200,.9); }
  #tglow { position:absolute; left:50%; top:88%; width:560px; height:120px; margin-left:-280px;
    background:radial-gradient(ellipse, rgba(41,232,200,.55), transparent 70%); filter:blur(8px); }

  /* ---------- SHOT 3 ---------- */
  #s3 { background:#050705; }
  #s3 .head { position:absolute; top:8%; width:100%; text-align:center; }
  #h1w { font-size:54px; font-weight:800; letter-spacing:3px; }
  #h2w { font-size:64px; font-weight:900; letter-spacing:3px; color:var(--greenB);
    text-shadow:0 0 26px var(--green); margin-top:8px; }
  #h1w span, #h2w span { display:inline-block; margin:0 12px; }
  .card { position:absolute; top:30%; width:420px; height:470px; border-radius:34px; }
  #cardR { left:17%; background:linear-gradient(165deg, #2a0503, #160201);
    border:5px solid #ff2e1f; box-shadow:0 0 70px rgba(255,46,31,.55), inset 0 0 50px rgba(255,46,31,.25); }
  #cardG { right:17%; background:linear-gradient(165deg, #06230a, #021104);
    border:5px solid var(--greenB); box-shadow:0 0 70px rgba(82,224,58,.55), inset 0 0 40px rgba(82,224,58,.2); }
  .card .num { width:100%; text-align:center; margin-top:70px; font-size:220px; font-weight:900; line-height:.95; }
  .card .unit { width:100%; text-align:center; font-size:86px; font-weight:900; letter-spacing:6px; }
  #cardR .num, #cardR .unit { color:#ff4433; text-shadow:0 0 44px rgba(255,68,51,.9); }
  #cardG .num, #cardG .unit { color:var(--greenB); text-shadow:0 0 44px rgba(82,224,58,.9); }
  .glowfloor { position:absolute; top:78%; width:560px; height:180px;
    border-radius:50%; filter:blur(26px); }
  #glowR { left:13.5%; background:radial-gradient(ellipse, rgba(255,46,31,.65), transparent 70%); }
  #glowG { right:13.5%; background:radial-gradient(ellipse, rgba(82,224,58,.65), transparent 70%); }
  .smoke { position:absolute; border-radius:50%; background:rgba(255,60,40,.16); filter:blur(22px); }
  #arrow { position:absolute; left:50%; top:47%; height:120px; width:340px; margin:-60px 0 0 -170px;
    transform-origin:left center; }
  #arrow .bar { position:absolute; left:0; top:30px; height:60px; width:250px;
    background:linear-gradient(90deg, #2f9e1e, var(--greenB));
    box-shadow:0 0 50px var(--green); border-radius:8px; }
  #arrow .tip { position:absolute; left:245px; top:0; width:0; height:0;
    border-top:60px solid transparent; border-bottom:60px solid transparent;
    border-left:95px solid var(--greenB); filter:drop-shadow(0 0 30px var(--green)); }

  /* ---------- SHOT 4 ---------- */
  #s4 { background:#010201; }
  #net { position:absolute; inset:0; opacity:.5; }
  #titlewrap { position:absolute; top:50%; left:0; right:0; text-align:center; transform:translateY(-50%); }
  #t_the { font-size:110px; font-weight:800; letter-spacing:26px;
    background:linear-gradient(180deg, #fdfdfd, #9aa39a 55%, #dfe4df);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 14px rgba(120,255,120,.25)); }
  #t_problem { font-size:230px; font-weight:900; letter-spacing:14px; line-height:1;
    background:linear-gradient(180deg, #ffffff, #8f978f 60%, #e8ece8);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(120,255,120,.28)); }
  #msgicon { position:absolute; top:14%; left:50%; width:150px; height:120px; margin-left:-75px; }
  #msgicon .bubble { position:absolute; inset:0; border:9px solid var(--greenB); border-radius:26px;
    box-shadow:0 0 34px rgba(82,224,58,.6); }
  #msgicon .tail { position:absolute; left:22px; bottom:-26px; width:0; height:0;
    border-left:9px solid var(--greenB); border-top:28px solid var(--greenB);
    border-right:22px solid transparent; }
  #msgicon .mchk { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:64px; font-weight:900; color:var(--greenB); text-shadow:0 0 24px var(--green); }
  .p4 { position:absolute; width:6px; height:6px; border-radius:50%; background:var(--green);
    box-shadow:0 0 12px var(--green); }

  #vignette { position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5) 100%); }
  #blackout { position:absolute; inset:0; background:#000; opacity:0; }
</style>
</head>
<body>
<div id="stage">

  <div class="shot" id="s1">
    <div class="half left">
      <img id="custimg" src="clip1A-customer-face-only.png" alt="">
      <div class="grade"></div><div class="rain"></div>
      <div id="onhold"></div>
      <div id="spinner"></div>
      <div id="waitwrap">
        <div id="waittime">00:00</div>
        <div id="waitlbl">WAIT TIME</div>
      </div>
    </div>
    <div class="half right">
      <img id="btnimg" src="clip1B-onetap-button.png" alt="">
      <div class="grade"></div>
      <div id="rippleHost"></div>
    </div>
    <div id="beam"></div>
    <div id="flash"></div>
  </div>

  <div class="shot" id="s2">
    <div id="floor"></div><div id="fog"></div>
    <div id="scantitle">AUTO-SCAN IN PROGRESS...</div>
    <svg id="beams" width="1920" height="1080"></svg>
    <div id="phone"><div class="notch"></div><div class="chk" id="chk">✓</div></div>
    <div id="iconhost"></div>
    <div id="tglow"></div>
    <div id="ticket">TICKET</div>
  </div>

  <div class="shot" id="s3">
    <div class="head">
      <div id="h1w"></div>
      <div id="h2w"></div>
    </div>
    <div class="glowfloor" id="glowR"></div>
    <div class="glowfloor" id="glowG"></div>
    <div class="card" id="cardR"><div class="num">23</div><div class="unit">MIN</div></div>
    <div class="card" id="cardG"><div class="num">10</div><div class="unit">SEC</div></div>
    <div id="smokehost"></div>
    <div id="arrow"><div class="bar"></div><div class="tip"></div></div>
  </div>

  <div class="shot" id="s4">
    <svg id="net" width="1920" height="1080"></svg>
    <div id="p4host"></div>
    <div id="msgicon"><div class="bubble"></div><div class="tail"></div><div class="mchk">✓</div></div>
    <div id="titlewrap">
      <div id="t_the">THE</div>
      <div id="t_problem">PROBLEM</div>
    </div>
  </div>

  <div id="vignette"></div>
  <div id="blackout"></div>
</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
const seg = (t, a, b) => clamp01((t - a) / (b - a));
const lerp = (a, b, p) => a + (b - a) * p;
const eo = p => 1 - Math.pow(1 - p, 3);          // easeOutCubic
const ei = p => p * p * p;                       // easeInCubic
const eio = p => p < .5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
const eb = p => { const c = 1.70158; return 1 + (c+1)*Math.pow(p-1,3) + c*Math.pow(p-1,2); }; // back

/* ---------- static setup ---------- */
// Shot 2 icons: [emoji, label, homeX, homeY, fromX, fromY, tStart]
const PHONE = { x: 960, y: 508 };
const ICONS = [
  ["📶","SIGNAL",          440, 300, -300, 300, 3.55],
  ["📡","NETWORK",         400, 540, -300, 1400, 4.15],
  ["📱","DEVICE INFO",     470, 790, -300, 790, 4.75],
  ["📍","LOCATION",       1480, 300, 2220, -200, 5.35],
  ["☁️","SERVICE STATUS", 1520, 540, 2220, 540, 5.95],
  ["📄","DIAGNOSTIC DATA",1450, 790, 2220, 1300, 6.55],
];
const iconEls = [], beamEls = [];
{
  const host = $("iconhost"), svg = $("beams");
  ICONS.forEach(ic => {
    const d = document.createElement("div");
    d.className = "icon";
    d.innerHTML = ic[0] + `<div class="ilabel">${ic[1]}</div>`;
    host.appendChild(d); iconEls.push(d);
    const l = document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("stroke","#3DBE29"); l.setAttribute("stroke-width","4");
    l.setAttribute("filter","drop-shadow(0 0 6px #3DBE29)");
    svg.appendChild(l); beamEls.push(l);
  });
}
// Shot 1 ripples
const rippleEls = [];
{
  const host = $("rippleHost");
  for (let i = 0; i < 3; i++) {
    const r = document.createElement("div");
    r.className = "ripple";
    host.appendChild(r); rippleEls.push(r);
  }
}
// Shot 3 header words + smoke
const H1 = "RESOLVING CUSTOMER ISSUES".split(" ");
const H2 = "FASTER & MORE ACCURATELY".split(" ");
$("h1w").innerHTML = H1.map(w=>`<span>${w}</span>`).join("");
$("h2w").innerHTML = H2.map(w=>`<span>${w}</span>`).join("");
const h1Els = [...$("h1w").children], h2Els = [...$("h2w").children];
const smokeEls = [];
{
  const host = $("smokehost");
  for (let i = 0; i < 6; i++) {
    const s = document.createElement("div");
    s.className = "smoke";
    const sz = 120 + (i * 37) % 90;
    s.style.width = s.style.height = sz + "px";
    host.appendChild(s); smokeEls.push(s);
  }
}
// Shot 4 network lines + particles
{
  const svg = $("net");
  let rng = 7;
  const rnd = () => (rng = (rng * 16807) % 2147483647) / 2147483647;
  const pts = [];
  for (let i = 0; i < 26; i++) pts.push([rnd()*1920, rnd()*1080]);
  for (let i = 0; i < 26; i++) for (let j = i+1; j < 26; j++) {
    const dx = pts[i][0]-pts[j][0], dy = pts[i][1]-pts[j][1];
    if (Math.sqrt(dx*dx+dy*dy) < 330) {
      const l = document.createElementNS("http://www.w3.org/2000/svg","line");
      l.setAttribute("x1",pts[i][0]); l.setAttribute("y1",pts[i][1]);
      l.setAttribute("x2",pts[j][0]); l.setAttribute("y2",pts[j][1]);
      l.setAttribute("stroke","rgba(61,190,41,.16)"); l.setAttribute("stroke-width","1.5");
      svg.appendChild(l);
    }
  }
  const host = $("p4host");
  for (let i = 0; i < 26; i++) {
    const p = document.createElement("div");
    p.className = "p4";
    p.style.left = pts[i][0]+"px"; p.style.top = pts[i][1]+"px";
    host.appendChild(p);
  }
}

/* ---------- master render ---------- */
function render(t) {
  const s1 = $("s1"), s2 = $("s2"), s3 = $("s3"), s4 = $("s4");
  s1.style.opacity = (t < 3.05) ? 1 : 0;
  s2.style.opacity = (t >= 2.95 && t < 8.1) ? 1 : 0;
  s3.style.opacity = (t >= 8.0 && t < 13.15) ? 1 : 0;
  s4.style.opacity = (t >= 13.0) ? 1 : 0;

  /* ===== SHOT 1 (0–3) ===== */
  if (t < 3.2) {
    // slow push-in + subtle handheld shake on the customer
    const z = 1.10 + 0.10 * seg(t, 0, 3);
    const shx = Math.sin(t*7.3)*3 + Math.sin(t*13.1)*1.5;
    const shy = Math.cos(t*6.1)*2.5;
    $("custimg").style.transform = `scale(${z}) translate(${shx}px,${shy}px)`;
    // typewriter ON HOLD...
    const chars = Math.floor(seg(t, .25, 1.3) * 10);
    $("onhold").textContent = "ON HOLD...".slice(0, chars);
    $("spinner").style.transform = `rotate(${t*520}deg)`;
    // wait-time counter 00:00 → 23:00, then red pulse
    const stops = [[0,.55,"00:00"],[.55,1.0,"05:00"],[1.0,1.5,"12:00"],[1.5,99,"23:00"]];
    const w = stops.find(s => t >= s[0] && t < s[1]);
    $("waittime").textContent = w[2];
    const pulse = (t > 1.6) ? 1 + 0.06*Math.abs(Math.sin((t-1.6)*6)) : 1;
    $("waittime").style.transform = `scale(${pulse})`;
    // diagonal beam sweep 1.35–1.8 reveals right side
    const bp = seg(t, 1.35, 1.8);
    $("beam").style.opacity = (bp > 0 && bp < 1) ? 1 : 0;
    $("beam").style.left = lerp(105, 30, eio(bp)) + "%";
    const rightOn = seg(t, 1.5, 1.85);
    $("s1").querySelector(".right").style.opacity = eo(rightOn);
    $("btnimg").style.transform = `scale(${1.06 + .07*seg(t,1.5,3)})`;
    // triple ripple from the button at 2.35+
    rippleEls.forEach((r, i) => {
      const p = seg(t, 2.35 + i*0.16, 2.95 + i*0.16);
      const d = lerp(60, 2400, eo(p));
      r.style.opacity = (p > 0 && p < 1) ? (1 - p) : 0;
      r.style.width = r.style.height = d + "px";
      r.style.left = `calc(62% - ${d/2}px)`;
      r.style.top = `calc(40% - ${d/2}px)`;
    });
    // green flash into shot 2
    const fp = seg(t, 2.78, 3.02);
    $("flash").style.opacity = fp > 0 ? Math.sin(fp * Math.PI) : 0;
  }

  /* ===== SHOT 2 (3–8) ===== */
  if (t >= 2.9 && t < 8.2) {
    // camera dolly-in on whole shot
    s2.style.transform = `scale(${1 + 0.05*seg(t,3,8)})`;
    // glitch-in title
    const gp = seg(t, 3.15, 3.6);
    const jit = gp < 1 ? (Math.sin(t*91)*10*(1-gp)) : 0;
    $("scantitle").style.opacity = gp;
    $("scantitle").style.transform = `translateX(${jit}px)`;
    // floating phone: bob + slow rotate, brightens as icons attach
    let attached = 0;
    ICONS.forEach(ic => { if (t > ic[6] + .45) attached++; });
    const bob = Math.sin(t*1.9)*12;
    $("phone").style.transform = `translateY(${bob}px) rotate(${Math.sin(t*.9)*2.4}deg)`;
    $("phone").style.boxShadow =
      `0 0 ${34+attached*16}px rgba(61,190,41,${.45+attached*.08}), inset 0 0 ${20+attached*8}px rgba(61,190,41,.3)`;
    // icons fly in + beams draw
    iconEls.forEach((el, i) => {
      const ic = ICONS[i];
      const p = eo(seg(t, ic[6], ic[6] + .5));
      const x = lerp(ic[4], ic[2], p), y = lerp(ic[5], ic[3], p);
      el.style.opacity = p > 0 ? 1 : 0;
      el.style.transform = `translate(${x}px,${y + Math.sin(t*2+i)*6}px) scale(${lerp(.4,1,p)})`;
      const bp = seg(t, ic[6] + .4, ic[6] + .7);
      const bx = lerp(x, PHONE.x, bp), by = lerp(y + 0, PHONE.y, bp);
      beamEls[i].setAttribute("x1", x); beamEls[i].setAttribute("y1", y + Math.sin(t*2+i)*6);
      beamEls[i].setAttribute("x2", bx); beamEls[i].setAttribute("y2", by);
      beamEls[i].setAttribute("opacity", bp > 0 ? .85 : 0);
    });
    // checkmark flash at 7.1
    const cp = seg(t, 7.05, 7.35);
    $("chk").style.opacity = cp;
    $("chk").style.transform = `scale(${lerp(2.4, 1, eo(cp))})`;
    // ticket rises 7.35–7.95
    const tp = eo(seg(t, 7.35, 7.95));
    $("ticket").style.opacity = tp;
    $("ticket").style.transform = `translateY(${lerp(160, 0, tp)}px)`;
    $("tglow").style.opacity = tp;
  }

  /* ===== SHOT 3 (8–13) ===== */
  if (t >= 7.95 && t < 13.2) {
    s3.style.transform = `scale(${1 + 0.06*seg(t,8,13)})`;   // hero push-in
    // header words pop in one by one with light burst
    h1Els.forEach((el, i) => {
      const p = eo(seg(t, 8.15 + i*.18, 8.45 + i*.18));
      el.style.opacity = p;
      el.style.transform = `scale(${lerp(1.6,1,p)})`;
      el.style.textShadow = `0 0 ${lerp(40,8,p)}px rgba(255,255,255,${lerp(.9,.25,p)})`;
    });
    h2Els.forEach((el, i) => {
      const p = eo(seg(t, 8.8 + i*.18, 9.1 + i*.18));
      el.style.opacity = p;
      el.style.transform = `scale(${lerp(1.6,1,p)})`;
    });
    // red card slams in at 8.4, keeps shaking; dissolves after arrow
    const rIn = eo(seg(t, 8.4, 8.75));
    const dis = seg(t, 11.2, 12.3);                 // dissolve
    const rsh = (1 - dis) * (2.5 + 1.5*Math.sin(t*31));
    $("cardR").style.opacity = rIn * (1 - dis);
    $("cardR").style.transform =
      `scale(${lerp(1.5,1,rIn)}) translate(${rsh*Math.sin(t*37)}px,${rsh*Math.cos(t*29)}px)`;
    $("cardR").style.filter = `saturate(${1-dis}) brightness(${1-.5*dis})`;
    $("glowR").style.opacity = rIn * (1 - dis);
    smokeEls.forEach((s, i) => {
      s.style.opacity = rIn * (1 - dis) * .8;
      const a = t*.55 + i*1.1;
      s.style.left = `calc(17% + ${60 + 130*Math.sin(a)+i*40}px)`;
      s.style.top = `calc(${64 - i*7 + 5*Math.cos(a*1.3)}%)`;
    });
    // green card floats up at 8.9, gently bobs, intensifies after takeover
    const gIn = eo(seg(t, 8.9, 9.3));
    const boost = seg(t, 11.2, 12.2);
    $("cardG").style.opacity = gIn;
    $("cardG").style.transform =
      `translateY(${lerp(120, 0, gIn) + Math.sin(t*1.7)*8}px) scale(${1 + .05*boost})`;
    $("cardG").style.boxShadow =
      `0 0 ${70 + 60*boost}px rgba(82,224,58,${.55 + .3*boost}), inset 0 0 40px rgba(82,224,58,.2)`;
    $("glowG").style.opacity = gIn * (1 + boost);
    // arrow grows 10.3–11.2
    const ap = eb(seg(t, 10.3, 11.1));
    $("arrow").style.opacity = ap > 0 ? 1 : 0;
    $("arrow").style.transform = `scale(${Math.max(.001, ap)})`;
  }

  /* ===== SHOT 4 (13–15) ===== */
  if (t >= 12.9) {
    // collapse wipe: blackout in then partial out
    const cIn = seg(t, 12.8, 13.15), cOut = seg(t, 13.15, 13.7);
    $("blackout").style.opacity = Math.max(0, Math.min(cIn, 1) - cOut*.92);
    s4.style.transform = `scale(${1 + 0.055*seg(t, 13.1, 15.2)})`;  // dramatic push-in
    // title rises from darkness
    const tp = eo(seg(t, 13.25, 14.25));
    $("titlewrap").style.opacity = tp;
    $("titlewrap").style.transform = `translateY(${lerp(60,-50,tp)}%) scale(${lerp(.9,1,tp)})`;
    // wait — translateY base is -50%; combine:
    $("titlewrap").style.transform = `translateY(calc(-50% + ${lerp(70,0,tp)}px)) scale(${lerp(.9,1,tp)})`;
    // message icon: bubble 13.5, check pop 14.0, glow pulse after
    const bp = eo(seg(t, 13.5, 13.9));
    $("msgicon").style.opacity = bp;
    $("msgicon").style.transform = `scale(${lerp(.5,1,bp)})`;
    const mp = eb(seg(t, 14.0, 14.35));
    const glow = t > 14.35 ? .5 + .5*Math.sin((t-14.35)*4) : 1;
    $("msgicon").querySelector(".mchk").style.opacity = mp;
    $("msgicon").querySelector(".mchk").style.transform = `scale(${Math.max(.001,mp)})`;
    $("msgicon").querySelector(".bubble").style.boxShadow =
      `0 0 ${34 + 20*glow}px rgba(82,224,58,${.4 + .3*glow})`;
    // drifting particles
    [...$("p4host").children].forEach((p, i) => {
      p.style.transform = `translate(${Math.sin(t*.4+i)*14}px, ${Math.cos(t*.3+i*1.7)*12}px)`;
    });
  }
}

/* ---------- driver ---------- */
const q = new URLSearchParams(location.search);
if (q.has("freeze")) {
  render(parseFloat(q.get("freeze")) || 0);
  document.title = "Scene1Frozen";
} else {
  const t0 = performance.now();
  (function loop() {
    const t = (performance.now() - t0) / 1000;
    render(Math.min(t, 15.4));
    if (t < 15.5) requestAnimationFrame(loop);
  })();
}
</script>
</body>
